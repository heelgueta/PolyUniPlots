---
title: Multiple Ordinal/Nominal Plots
name: PolyOrd
jus: '3.0'
stage: 0
compilerMode: aggressive

children:
  - type: VariableSupplier
    name: variableSupplier
    persistSelectionWhenFiltered: true
    children:
      - type: TargetLayoutBox
        label: Variables (ordinal / nominal)
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
            maxItemCount: 30

  - type: CollapseBox
    label: Layout
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: diverging
          - type: ComboBox
            name: sortVars
          - type: CheckBox
            name: reverseVars

  - type: CollapseBox
    label: Labels
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: CheckBox
            name: showPct
          - type: TextBox
            name: minPctLabel
            suffix: '%'
            inputPattern: '[0-9]+'
          - type: CheckBox
            name: showN

  - type: CollapseBox
    label: Appearance
    collapsed: false
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: ComboBox
            name: colorScheme
          - type: ComboBox
            name: themeChoice
          - type: ComboBox
            name: legendPos
          - type: TextBox
            name: legendTitle
            format: string
          - type: TextBox
            name: barHeight
            suffix: '%'
            inputPattern: '[0-9]+'

  - type: CollapseBox
    label: Labels & Size
    collapsed: true
    children:
      - type: LayoutBox
        margin: large
        children:
          - type: TextBox
            name: title
            format: string
          - type: TextBox
            name: plotWidth
            suffix: 'px'
            inputPattern: '[0-9]+'
          - type: TextBox
            name: plotHeight
            suffix: 'px'
            inputPattern: '[0-9]+'
