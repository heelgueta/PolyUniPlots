---
name: polyOrd
title: Multiple Ordinal/Nominal Plots
menuGroup: PolyUniPlots
version: '0.3.0'
jas: '1.2'

options:
    - name: data
      type: Data
    - name: vars
      title: Variables
      type: Variables
      suggested:
        - ordinal
        - nominal
      permitted:
        - factor
    - name: chartType
      title: Chart type
      type: List
      options:
        - name: bars
          title: Stacked bars
        - name: waffle
          title: Waffle chart
        - name: pictogram
          title: Pictogram
        - name: parliament
          title: Parliament/arc
      default: bars
    - name: diverging
      title: Diverging layout (Likert-style)
      type: Bool
      default: false
    - name: sortVars
      title: Sort variables
      type: List
      options:
        - name: none
          title: As entered
        - name: name
          title: Alphabetically
        - name: freq_first
          title: By first category
        - name: freq_last
          title: By last category
      default: none
    - name: reverseVars
      title: Reverse variable order
      type: Bool
      default: false
    - name: showPct
      title: Show percentage labels
      type: Bool
      default: true
    - name: minPctLabel
      title: Min % to label
      type: Integer
      min: 0
      max: 50
      default: 5
    - name: showN
      title: Show N per variable
      type: Bool
      default: false
    - name: colorScheme
      title: Color palette
      type: List
      options:
        - name: rdbulite
          title: Red–Blue (diverging)
        - name: rdylgn
          title: Red–Yellow–Green
        - name: piyg
          title: Pink–Green
        - name: prgn
          title: Purple–Green
        - name: pastel
          title: Pastel 1
        - name: dark2
          title: Dark 2
        - name: set2
          title: Set 2
        - name: viridis
          title: Viridis
        - name: plasma
          title: Plasma
      default: set2
    - name: legendTitle
      title: Legend title
      type: String
      default: ''
    - name: legendPos
      title: Legend position
      type: List
      options:
        - name: bottom
          title: Bottom
        - name: right
          title: Right
        - name: top
          title: Top
        - name: none
          title: None
      default: bottom
    - name: themeChoice
      title: Theme
      type: List
      options:
        - name: minimal
          title: Minimal
        - name: classic
          title: Classic
        - name: bw
          title: Black & White
        - name: light
          title: Light
      default: minimal
    - name: barHeight
      title: Bar height (%)
      type: Integer
      min: 10
      max: 100
      default: 70
    - name: title
      title: Plot title
      type: String
      default: ''
    - name: plotWidth
      title: Width (px)
      type: Integer
      min: 300
      max: 2000
      default: 700
    - name: plotHeight
      title: Height (px)
      type: Integer
      min: 150
      max: 2000
      default: 400

...
