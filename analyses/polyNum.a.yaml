---
name: polyNum
title: Multiple Numeric Plots
menuGroup: PolyUniPlots
version: '0.3.0'
jas: '1.2'

options:
    - name: data
      type: Data
    - name: vars
      title: Variables
      type: Variables
      suggested:
        - continuous
      permitted:
        - numeric
    - name: plotType
      title: Plot type
      type: List
      options:
        - name: box
          title: Box plot
        - name: violin
          title: Violin
        - name: strip
          title: Strip
        - name: histogram
          title: Histogram
        - name: ridge
          title: Ridge
        - name: barcode
          title: Barcode
        - name: raincloud
          title: Raincloud
      default: box
    - name: orientation
      title: Orientation
      type: List
      options:
        - name: vertical
          title: Vertical
        - name: horizontal
          title: Horizontal
      default: vertical
    - name: showJitter
      title: Overlay jitter
      type: Bool
      default: false
    - name: showMean
      title: Show mean
      type: Bool
      default: false
    - name: showMeanCI
      title: With confidence interval
      type: Bool
      default: false
    - name: ciWidth
      title: CI width (%)
      type: Integer
      min: 50
      max: 99
      default: 95
    - name: showRug
      title: Rug
      type: Bool
      default: false
    - name: showOutliers
      title: Show outliers
      type: Bool
      default: true
    - name: violinScale
      title: Violin scale
      type: List
      options:
        - name: area
          title: Area
        - name: count
          title: Count
        - name: width
          title: Width
      default: area
    - name: plotAlpha
      title: Transparency (%)
      type: Integer
      min: 0
      max: 100
      default: 80
    - name: boxWidth
      title: Box/strip width (%)
      type: Integer
      min: 5
      max: 100
      default: 55
    - name: jitterWidth
      title: Jitter spread (%)
      type: Integer
      min: 0
      max: 50
      default: 20
    - name: ridgeOverlap
      title: Ridge overlap (%)
      type: Integer
      min: 0
      max: 200
      default: 50
    - name: lineWidth
      title: Line thickness
      type: Integer
      min: 1
      max: 5
      default: 2
    - name: colorScheme
      title: Color palette
      type: List
      options:
        - name: viridis
          title: Viridis
        - name: plasma
          title: Plasma
        - name: mako
          title: Mako
        - name: rocket
          title: Rocket
        - name: turbo
          title: Turbo
        - name: dark
          title: Dark 2
        - name: pastel
          title: Pastel 1
        - name: warm
          title: Warm
        - name: cold
          title: Cold
      default: viridis
    - name: themeChoice
      title: Theme
      type: List
      options:
        - name: minimal
          title: Minimal
        - name: classic
          title: Classic
        - name: bw
          title: Black & White
        - name: light
          title: Light
      default: minimal
    - name: title
      title: Plot title
      type: String
      default: ''
    - name: plotWidth
      title: Width (px)
      type: Integer
      min: 300
      max: 2000
      default: 650
    - name: plotHeight
      title: Height (px)
      type: Integer
      min: 200
      max: 2000
      default: 480

...
